name: Publish image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container tag to publish
        required: true
        default: "1.0.5"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ghcr.io/umbrel-arr/umbrelarr:${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/umbrel-arr/umbrelarr
            org.opencontainers.image.title=umbrelarr
            org.opencontainers.image.version=${{ inputs.image_tag }}
      - name: Report immutable digest
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: printf 'ghcr.io/umbrel-arr/umbrelarr:%s@%s\n' "$IMAGE_TAG" "$IMAGE_DIGEST"
